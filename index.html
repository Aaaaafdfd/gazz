<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления газом</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <!-- Боковое меню -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-fire"></i>
                <span>GasControl</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Обзор
                </button>
                <button class="nav-item" data-page="valves">
                    <i class="fas fa-shield-alt"></i> Клапаны
                </button>
                <button class="nav-item" data-page="history">
                    <i class="fas fa-chart-line"></i> История
                </button>
            </nav>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>Администратор</span>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <header class="header">
                <h1 id="page-title">Обзор системы</h1>
                <div class="header-actions">
                    <span class="status-badge online"><i class="fas fa-circle"></i> Подключено</span>
                    <button id="refreshBtn" class="btn-icon"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <!-- Контейнер для динамических страниц -->
            <section id="page-content">
                <!-- Содержимое будет вставлено через JS -->
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
